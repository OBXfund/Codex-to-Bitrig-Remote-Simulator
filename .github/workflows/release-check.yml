name: Release Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run release checks
        run: python3 scripts/release_check.py
